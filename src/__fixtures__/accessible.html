<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accessible Test Page</title>
</head>
<body>
  <header>
    <nav aria-label="Main navigation">
      <ul>
        <li><a href="#main">Skip to main content</a></li>
        <li><a href="/">Home</a></li>
        <li><a href="/about">About</a></li>
      </ul>
    </nav>
  </header>

  <main id="main">
    <h1>Welcome to the Accessible Page</h1>
    <p>This page follows accessibility best practices.</p>

    <section aria-labelledby="form-heading">
      <h2 id="form-heading">Contact Form</h2>
      <form>
        <div>
          <label for="name">Name</label>
          <input type="text" id="name" name="name" required>
        </div>
        <div>
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required>
        </div>
        <button type="submit">Submit</button>
      </form>
    </section>

    <section aria-labelledby="image-heading">
      <h2 id="image-heading">Image Example</h2>
      <img src="data:image/gif;base64,R0lGODlhAQABAIAAAP///wAAACH5BAEAAAAALAAAAAABAAEAAAICRAEAOw=="
           alt="A placeholder image for testing purposes">
    </section>
  </main>

  <footer>
    <p>&copy; 2024 Test Company</p>
  </footer>
</body>
</html>
